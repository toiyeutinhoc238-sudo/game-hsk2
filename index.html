<!DOCTYPE html>
<html lang="vi" translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>HSK 2: Ai Là Triệu Phú - Chinh Phục Từ Vựng</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/questions.js"></script>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👑</text></svg>">
</head>

<body>
    <div class="container"
        style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <header>
            <h1>AI LÀ TRIỆU PHÚ</h1>
            <p style="text-align: center; color: var(--secondary); font-weight: 600; letter-spacing: 1px;">PHIÊN BẢN HSK
                2</p>
            <p
                style="text-align: center; color: var(--text-muted); margin-top: 1rem; max-width: 600px; margin-left: auto; margin-right: auto;">
                Chinh phục 15 câu hỏi từ vựng để giành lấy danh hiệu Triệu Phú HSK 2. Bạn đã sẵn sàng thử thách kiến
                thức của mình?
            </p>
            <button id="musicToggle" class="btn-secondary" onclick="toggleMusic()"
                style="position: fixed; top: 2rem; right: 2rem; z-index: 1001; padding: 0.8rem; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">🔊</button>
        </header>

        <section class="lesson-selection" style="width: 100%;">
            <div class="lesson-grid" id="lessonGrid">
                <!-- Lessons will be generated here -->
            </div>
        </section>

        <footer style="margin-top: 4rem; color: var(--text-muted); font-size: 0.9rem;">
            &copy; 2026 HSK 2 Millionaire Edition
        </footer>
    </div>

    <script>
        const bgMusic = new Audio('ailatrieuphu.mp3');
        bgMusic.loop = true;

        const grid = document.getElementById('lessonGrid');
        const allTopics = Object.keys(hsk2Vocab);
        const filteredTopics = allTopics.filter(topic => hsk2Vocab[topic].length >= 9);

        // Group topics by base name to handle parts
        const groups = [];
        const groupMap = new Map();

        filteredTopics.forEach(topic => {
            const match = topic.match(/^(.*?)\s*\(Phần\s*(\d+)\)$/);
            const baseName = match ? match[1] : topic;
            const partNum = match ? parseInt(match[2]) : null;

            if (!groupMap.has(baseName)) {
                const group = { baseName, items: [] };
                groupMap.set(baseName, group);
                groups.push(group);
            }
            groupMap.get(baseName).items.push({ name: topic, part: partNum });
        });

        groups.forEach((group, gIdx) => {
            group.items.forEach((item, iIdx) => {
                const card = document.createElement('div');
                card.className = 'glass lesson-card';
                card.innerHTML = `
                    <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">CHỦ ĐỀ</div>
                    <h3 style="font-size: 1.1rem; line-height: 1.2;">${item.name}</h3>
                    <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 0.5rem;">${hsk2Vocab[item.name].length} từ vựng</p>
                `;

                let linkId = `chude${gIdx + 1}`;
                if (group.items.length > 1) {
                    linkId += `_phan${item.part || (iIdx + 1)}`;
                }

                card.onclick = () => {
                    card.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        window.location.href = `game.html?topic=${linkId}`;
                    }, 150);
                };
                grid.appendChild(card);
            });
        });

        function toggleMusic() {
            const btn = document.getElementById('musicToggle');
            if (bgMusic.paused) {
                bgMusic.play();
                btn.textContent = '🔊';
                localStorage.setItem('musicEnabled', 'true');
            } else {
                bgMusic.pause();
                btn.textContent = '🔇';
                localStorage.setItem('musicEnabled', 'false');
            }
        }

        // Initialize music state
        if (localStorage.getItem('musicEnabled') === 'false') {
            document.getElementById('musicToggle').textContent = '🔇';
        }

        // Start music on first interaction
        document.addEventListener('click', () => {
            if (localStorage.getItem('musicEnabled') !== 'false' && bgMusic.paused) {
                bgMusic.play().catch(e => console.log("Autoplay blocked:", e));
            }
        }, { once: true });
    </script>
</body>

</html>
